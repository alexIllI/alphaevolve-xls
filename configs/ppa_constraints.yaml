# ─────────────────────────────────────────────────────────────────────────────
# ppa_constraints.yaml
# PPA targets for the XLS codegen pipeline.
#
# NOTE: clock_period_ps is NOT set here. It is always supplied via the
# --clock_period CLI flag so each run has an explicit, fixed constraint that
# the evolution process never modifies. Choose it based on your design:
#   simple arithmetic (mac, dot)  →  ~1000 ps
#   wide multipliers / float FMA  →  1500–2000 ps
# ─────────────────────────────────────────────────────────────────────────────

# XLS delay model used for both codegen_main and benchmark_main.
#   'unit'  — abstract 1-unit-per-op model. Fast. No JIT compilation.
#             Critical path is in abstract units, not real picoseconds.
#   'asap7' — ASAP7 7nm standard-cell library (JIT-compiled via LLVM on first use).
#             Gives real picosecond delays and area. Slower, especially with --ppa_mode slow.
#             benchmark_main with asap7 can take 5–30 min on complex designs.
# Recommendation: use 'unit' during fast-mode iteration, switch to 'asap7' only
# for final slow-mode runs where you need real timing/area numbers.
delay_model: "asap7"

# Force a fixed number of pipeline stages (null = let the scheduler decide).
# Set to an integer to constrain the search (e.g. 3 means exactly 3 stages).
pipeline_stages: 8

# Codegen mode: 'pipeline' (multi-stage) or 'combinational' (single stage).
# Must be 'pipeline' for multi-stage PPA evaluation.
generator: "pipeline"

# ─────────────────────────────────────────────────────────────────────────────
# Per-design constraint overrides.
# Keys must match the DSLX file stem (filename without .x).
# Use these to override pipeline_stages or generator for specific designs.
# clock_period_ps cannot be overridden here — use --clock_period on the CLI.
# ─────────────────────────────────────────────────────────────────────────────
per_design: {}
