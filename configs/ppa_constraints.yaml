# ─────────────────────────────────────────────────────────────────────────────
# ppa_constraints.yaml
# PPA targets for the XLS codegen pipeline.
# These constraints are passed to codegen_main and used for design evaluation.
# ─────────────────────────────────────────────────────────────────────────────

# XLS delay model: 'unit' (abstract, fast), 'sky130', 'asap7' (technology-specific)
delay_model: "asap7"

# Target clock period in picoseconds.
# The scheduler must fit all operations within this timing budget per stage.
# Lower → more pipeline stages required → harder constraint.
clock_period_ps: 1000

# Force a fixed number of pipeline stages (null = let the scheduler decide).
# Set to an integer to constrain the search (e.g. 3 means exactly 3 stages).
pipeline_stages: null

# Codegen mode: 'pipeline' (multi-stage) or 'combinational' (single stage).
# Must be 'pipeline' for multi-stage PPA evaluation.
generator: "pipeline"
