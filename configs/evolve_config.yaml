# ─────────────────────────────────────────────────────────────────────────────
# evolve_config.yaml
# AlphaEvolve hyperparameters and experiment settings.
# ─────────────────────────────────────────────────────────────────────────────

# ── Population ────────────────────────────────────────────────────────────────
num_islands: 4          # Number of independent island populations
migration_interval: 5   # Every N iterations, share global best across islands

# ── AI Sampler ────────────────────────────────────────────────────────────────
ai_backend: "codex"     # 'openai' (Python SDK direct) or 'codex' (Codex CLI via npm)
ai_model: "o3"          # Model passed to codex CLI --model flag
max_tokens: 8192        # Max tokens for AI response

# ── Mutation targets (which functions the AI evolves) ─────────────────────────
# Available: 'sdc_objective', 'delay_constraints', 'min_cut'
mutation_types:
  - sdc_objective
  - delay_constraints

# ── Build ─────────────────────────────────────────────────────────────────────
bazel_jobs: 8           # Parallel Bazel jobs (set to your core count)

# ── PPA Scoring ───────────────────────────────────────────────────────────────
# Score = num_stages * stage_weight + pipeline_reg_bits * reg_weight
# Lower is better.
stage_weight: 1000      # Stages are the primary optimization target
reg_weight: 1           # Register bits secondary

# ── Logging ───────────────────────────────────────────────────────────────────
log_level: "INFO"       # DEBUG | INFO | WARNING
save_all_verilog: false # If true, keep generated .v for every candidate
