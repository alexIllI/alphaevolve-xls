# ─────────────────────────────────────────────────────────────────────────────
# evolve_config.yaml
# AlphaEvolve hyperparameters and experiment settings.
# ─────────────────────────────────────────────────────────────────────────────

# ── Population ────────────────────────────────────────────────────────────────
num_islands: 1          # Keep the default search linear and easy to interpret
migration_interval: 5   # Every N iterations, share global best across islands

# ── AI Sampler ────────────────────────────────────────────────────────────────
ai_backend: "codex"     # 'codex' (Codex CLI v0.120 exec) or 'openai' (Python SDK)
ai_model: "gpt-5.4"    # Model shown in codex TUI — accessible via education subscription
max_tokens: 8192        # Max tokens for AI response

# ── Mutation targets (which functions the AI evolves) ─────────────────────────
# Only one mutation target is supported: 'agent_scheduler'. The AI evolves
# xls/scheduling/agent_generated_scheduler.cc — the standalone scheduler XLS
# dispatches when --scheduling_strategy=agent.
mutation_types:
  - agent_scheduler

# ── PPA evaluation depth ──────────────────────────────────────────────────────
# fast     : codegen_main only; parse block_metrics for stages + reg_bits
# medium   : (future) Yosys synth; stat for gate + FF count
# slow     : rebuild + run benchmark_main for asap7 area + critical path
# slowest  : (future) Yosys synth_asap7 + OpenROAD place-and-route
ppa_mode: "fast"

# ── Build ─────────────────────────────────────────────────────────────────────
bazel_jobs: 8           # Parallel Bazel jobs (set to your core count)
max_build_retries: 3    # Per iteration: retry compile this many times with error feedback

# ── PPA Scoring ───────────────────────────────────────────────────────────────
# Score uses normalized terms inside ppa_metrics.py:
#   (num_stages / REF_STAGES)            * stage_weight
# + (pipeline_flops / REF_FLOP_BITS)     * power_weight
# + (area_um2 / REF_AREA_UM2)            * area_weight
# + (max_stage_delay_ps / REF_CLOCK_PS)  * delay_weight
# + balance_norm                         * balance_weight
# + (runtime_s / REF_TIMEOUT_S)          * runtime_weight
# Lower is better.
#
# For scheduler evolution:
# - `stage_weight` should stay modest. When the clock period and/or target stage
#   count is already constrained by the user, stage count should not dominate.
# - `power_weight` uses pipeline flop bits as an optional proxy only.
# - `area_weight` is intentionally modest because scheduling changes area less
#   directly than timing and balance.
# - `reg_weight` is still accepted as a backward-compatible alias for
#   `power_weight`.
stage_weight: 0.25
power_weight: 0
area_weight: 1
delay_weight: 1
balance_weight: 1.5
runtime_weight: 0.5
reg_weight: 1           # Deprecated alias for power_weight

# ── Logging ───────────────────────────────────────────────────────────────────
log_level: "INFO"       # DEBUG | INFO | WARNING
save_all_verilog: false # If true, keep generated .v for every candidate
